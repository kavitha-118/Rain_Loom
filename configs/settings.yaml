# ============================================================
# Monsoon-Textile Volatility Prediction System — Configuration
# ============================================================

project:
  name: "Monsoon Failures & Textile Stock Volatility"
  version: "2.0.0"
  description: "Causal ML pipeline predicting NSE textile stock volatility from IMD rainfall deficits"

# --------------- Data Sources ---------------
data:
  imd:
    start_year: 2000
    end_year: 2025
    resolution: 0.25  # degrees
    key_districts:
      Gujarat: [23.0, 72.5, "Ahmedabad", 21.17, 72.83, "Surat", 22.3, 70.8, "Rajkot"]
      Maharashtra: [21.15, 79.09, "Nagpur", 20.0, 73.78, "Nashik"]
      Telangana: [18.0, 79.58, "Warangal", 19.67, 78.53, "Adilabad"]
      TamilNadu: [11.0, 76.96, "Coimbatore"]
    monsoon_months: [6, 7, 8, 9]  # JJAS

  nse:
    stocks:
      ARVIND.NS:
        name: "Arvind Ltd"
        sector: "Integrated: Fabric + Brand"
        cotton_dependency: 0.70
        value_chain: "integrated"
      TRIDENT.NS:
        name: "Trident Ltd"
        sector: "Upstream: Yarn + Towels"
        cotton_dependency: 0.80
        value_chain: "upstream"
      KPRMILL.NS:
        name: "KPR Mill"
        sector: "Mid-stream: Spinning + Garments"
        cotton_dependency: 0.75
        value_chain: "midstream"
      WELSPUNLIV.NS:
        name: "Welspun Living"
        sector: "Downstream: Home Textiles"
        cotton_dependency: 0.65
        value_chain: "downstream"
      RSWM.NS:
        name: "RSWM Ltd"
        sector: "Upstream: Worsted Yarn + Fabric"
        cotton_dependency: 0.60
        value_chain: "upstream"
    benchmark: "^NSEI"
    vix: "^INDIAVIX"
    start_date: "2005-01-01"

  mcx:
    cotton_symbol: "COTTON"
    global_alt_symbol: "CT=F"  # ICE Cotton No.2 via Yahoo Finance

  macro:
    symbols:
      usd_inr: "INR=X"
      brent_crude: "BZ=F"
      nifty50: "^NSEI"
      india_vix: "^INDIAVIX"

# --------------- Feature Engineering ---------------
features:
  climate:
    deficit_threshold_pct: -20
    dry_spell_threshold_mm: 2
    severity_bins:
      normal: -10
      deficient: -25
      # Below -25 = scanty
  lags_weeks: [2, 4, 6, 8]
  volatility:
    realized_window: 20
    garman_klass_window: 20
    rolling_median_window: 52
  target:
    regime_threshold_sigma: 1.0  # vol_median + 1*vol_std = high regime

# --------------- Models ---------------
models:
  granger:
    max_lag: 12
    significance_level: 0.05

  var:
    max_lags: 8
    ic: "aic"
    irf_periods: 20

  ms_garch:
    k_regimes: 2
    search_reps: 50
    garch_p: 1
    garch_q: 1
    distribution: "t"

  xgboost:
    forecast_horizon: 4  # weeks ahead
    cv_splits: 5
    params:
      n_estimators: 300
      max_depth: 5
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      eval_metric: "auc"
      random_state: 42
    optuna:
      n_trials: 50
      timeout: 600  # seconds

  lstm:
    sequence_length: 12  # weeks lookback
    architecture:
      lstm_units_1: 64
      lstm_units_2: 32
      dense_units: 16
      dropout_rate: 0.3
    training:
      epochs: 100
      batch_size: 32
      patience: 10
      learning_rate: 0.001
    split:
      train: 0.70
      val: 0.15
      test: 0.15

  ensemble:
    weights:
      ms_garch: 0.30
      xgboost: 0.40
      lstm: 0.30
    risk_thresholds:
      low: 0.30
      moderate: 0.60
      high: 0.80
      # Above 0.80 = extreme

# --------------- Backtesting ---------------
backtesting:
  drought_years: [2009, 2014, 2015, 2023]
  normal_years: [2010, 2013, 2016, 2019]
  walk_forward_start: 2009
  target_metrics:
    auc_roc: 0.75
    f1_score: 0.65
    early_warning_weeks: [4, 8]
    false_positive_rate: 0.25
    brier_score: 0.20

# --------------- Societal Impact ---------------
impact:
  farmer:
    risk_trigger: 0.50
    advisory_months: [6, 7, 8]  # June-August
    pmfby_premium_range: [1500, 3000]  # Rs per hectare
    claim_range: [25000, 40000]  # Rs per hectare
    cotton_farmer_count: 6200000
  msme:
    risk_trigger: 0.40
    raw_material_pct: [0.50, 0.70]  # 50-70% of revenue
    hedging_savings_pct: [0.08, 0.12]  # 8-12%
    msme_count: 100000
  policy:
    update_frequency: "weekly"
    season: "JJAS"

# --------------- Dashboard ---------------
dashboard:
  title: "Monsoon-Textile Volatility Risk Monitor"
  theme: "dark"
  port: 8501
  refresh_interval_sec: 3600
